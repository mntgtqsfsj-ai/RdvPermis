<!DOCTYPE html>
<html>
<head>
  <title>RdvPermis - Résultat</title>
  <style>
    body {
      background: #f2f2f7;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      color: #1a73e8;
      margin-bottom: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      background-color: #1a73e8;
      color: white;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #155ab6;
    }

    #resultat {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #2e7d32; /* vert pour “admis” */
    }

    p.notice {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>RdvPermis</h1>
    <p class="notice">⚠️ Projet scolaire - site non officiel</p>

    <input type="text" id="neph" placeholder="Entrez votre numéro NEPH">
    <br>
    <button onclick="verifier()">Vérifier</button>

    <p id="resultat"></p>
  </div>

  <script>
    function verifier() {
      // Peu importe le numéro NEPH, le résultat est toujours le même
      document.getElementById("resultat").innerHTML =
        "✅ Résultat : ADMIS <br> 📊 Note : 37/40";
    }
  </script>

</body>
</html>
